<svg viewBox="0 0 400 260" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" style="max-width: 100%; height: auto;">
  <!-- 根节点（空棋盘） -->
  <rect x="180" y="10" width="40" height="40" fill="#fff" stroke="#333" rx="8" />
  <text x="200" y="35" text-anchor="middle" alignment-baseline="middle" font-size="18">空</text>

  <!-- 第一层：X走左上、X走中间、X走右下 -->
  <rect x="40" y="90" width="40" height="40" fill="#e3f2fd" stroke="#333" rx="8" />
  <text x="60" y="115" text-anchor="middle" alignment-baseline="middle" font-size="18">X↖</text>

  <rect x="180" y="90" width="40" height="40" fill="#e3f2fd" stroke="#333" rx="8" />
  <text x="200" y="115" text-anchor="middle" alignment-baseline="middle" font-size="18">X中</text>

  <rect x="320" y="90" width="40" height="40" fill="#e3f2fd" stroke="#333" rx="8" />
  <text x="340" y="115" text-anchor="middle" alignment-baseline="middle" font-size="18">X↘</text>

  <!-- 连线 -->
  <line x1="200" y1="50" x2="60" y2="90" stroke="#888" stroke-width="2" />
  <line x1="200" y1="50" x2="200" y2="90" stroke="#888" stroke-width="2" />
  <line x1="200" y1="50" x2="340" y2="90" stroke="#888" stroke-width="2" />

  <!-- 第二层举例：左上继续O走中间 -->
  <rect x="40" y="170" width="40" height="40" fill="#fffde7" stroke="#333" rx="8" />
  <text x="60" y="195" text-anchor="middle" alignment-baseline="middle" font-size="16">O中</text>
  <line x1="60" y1="130" x2="60" y2="170" stroke="#888" stroke-width="2" />

  <!-- 第二层举例：中间继续O走左上 -->
  <rect x="120" y="170" width="40" height="40" fill="#fffde7" stroke="#333" rx="8" />
  <text x="140" y="195" text-anchor="middle" alignment-baseline="middle" font-size="16">O↖</text>
  <line x1="200" y1="130" x2="140" y2="170" stroke="#888" stroke-width="2" />

  <!-- 第二层举例：右下继续O走中间 -->
  <rect x="320" y="170" width="40" height="40" fill="#fffde7" stroke="#333" rx="8" />
  <text x="340" y="195" text-anchor="middle" alignment-baseline="middle" font-size="16">O中</text>
  <line x1="340" y1="130" x2="340" y2="170" stroke="#888" stroke-width="2" />
</svg>
